{% extends "base.html" %}

{% block content %}

<h2>Rezultāti</h2>

{% for result in results %}
<div class="card">
    <h3>{{ result.race_title }}</h3>
    <p>Vieta: {{ result.place }}</p>
    <p>Braucējs: {{ result.rider_name }}</p>
    <p>Punkti: {{ result.points }}</p>
</div>
{% endfor %}

{% endblock %}
