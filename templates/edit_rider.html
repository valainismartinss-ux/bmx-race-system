{% extends "base.html" %}

{% block content %}

<h2>Rediģēt braucēju</h2>

<form method="POST" class="card">
    <label>Vārds:</label>
    <input type="text" name="name" value="{{ rider.name }}" required>

    <label>Vecums:</label>
    <input type="number" name="age" value="{{ rider.age }}" required>

    <label>Komanda:</label>
    <input type="text" name="team_name" value="{{ rider.team_name }}" required>

    <button type="submit">Saglabāt</button>
</form>

{% endblock %}
