{% extends "base.html" %}

{% block content %}

<h2>Sacensības</h2>
<a class="button" href="/register">Pieteikties sacensībām</a>

{% for race in races %}
<div class="card">
    <h3>{{ race.title }}</h3>
    <p>Datums: {{ race.race_date }}</p>
    <p>Vieta: {{ race.location }}</p>
</div>
{% endfor %}

{% endblock %}
